<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diablo</title>
  <link rel="stylesheet" href="../styles/theme.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <h1 class="popup-title">Diablo</h1>
    <p class="popup-desc">Arc-inspired browsing tweaks</p>
  </header>
  <main class="popup-main">
    <label class="popup-row">
      <span class="popup-label-wrap">
        <span class="popup-label">Peek Preview</span>
        <span class="popup-hint">Shift+Click to preview links</span>
      </span>
      <input type="checkbox" id="peekEnabled" class="popup-toggle" role="switch" aria-checked="true">
    </label>
    <label class="popup-row">
      <span class="popup-label-wrap">
        <span class="popup-label">Hover Preview</span>
        <span class="popup-hint">See link details on hover</span>
      </span>
      <input type="checkbox" id="hoverPreviewEnabled" class="popup-toggle" role="switch" aria-checked="true">
    </label>
    <label class="popup-row">
      <span class="popup-label-wrap">
        <span class="popup-label">Tabs Outside Groups</span>
        <span class="popup-hint">New tabs bypass tab groups</span>
      </span>
      <input type="checkbox" id="tabOutsideGroupsEnabled" class="popup-toggle" role="switch" aria-checked="false">
    </label>
  </main>
  <script src="popup.js"></script>
</body>
</html>
