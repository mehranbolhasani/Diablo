<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diablo</title>
  <link rel="stylesheet" href="../styles/theme.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <h1 class="popup-title">Diablo</h1>
    <p class="popup-desc">Peek-focused browsing</p>
  </header>
  <main class="popup-main">
    <label class="popup-row">
      <span class="popup-label-wrap">
        <span class="popup-label">Peek Preview</span>
        <span class="popup-hint">Shift+Click to preview links</span>
      </span>
      <input type="checkbox" id="peekEnabled" class="popup-toggle" role="switch" aria-checked="true">
    </label>
    <label class="popup-row popup-row-select" for="peekSizePreset">
      <span class="popup-label-wrap">
        <span class="popup-label">Peek Window Size</span>
        <span class="popup-hint">Default size for link preview panel</span>
      </span>
      <select id="peekSizePreset" class="popup-select" aria-label="Peek window size">
        <option value="small">Small</option>
        <option value="medium">Medium</option>
        <option value="large">Large</option>
      </select>
    </label>
    <label class="popup-row">
      <span class="popup-label-wrap">
        <span class="popup-label">Aggressive X Unshorten</span>
        <span class="popup-hint">Resolve stubborn t.co links via background tab</span>
      </span>
      <input type="checkbox" id="aggressiveXUnshortenEnabled" class="popup-toggle" role="switch" aria-checked="false">
    </label>
  </main>
  <script src="../shared/constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
